name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify judge import stays decoupled from media pipeline
        run: |
          python -c "import importlib, sys; sys.modules.pop('judge', None); sys.modules.pop('pipeline', None); importlib.import_module('judge'); assert 'pipeline' not in sys.modules, 'judge import should not load pipeline'"

      - name: Run public judgement command
        run: |
          python judge.py examples/candidates.json --output out/ci-judgements.json --work-dir .judgement-ci --quiet

      - name: Run checked-in evaluation suite
        run: |
          python scripts/evaluate_judgements.py

      - name: Run judgement trust pass
        run: |
          python scripts/trust_judgement_pass.py --report-dir trust-ci

      - name: Run test suite
        run: |
          python -m pytest -q